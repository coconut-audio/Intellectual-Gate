name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libasound2-dev \
            libfreetype-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_COMPILE_WARNING_AS_ERROR=ON

      - name: Build
        run: cmake --build build 2>&1 | tee build.log

      - name: Build tests
        run: cmake --build build --target Tests 2>&1 | tee -a build.log

      - name: Check for warnings
        run: |
          if grep -E "source/.*warning:" build.log | grep -v "modules/" | grep -v "gtest/" | grep -v "BinaryData"; then
            echo "::error::Warnings found in project code"
            exit 1
          fi

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package plugins
        if: github.event_name == 'push'
        run: |
          VST3=$(find build -name "Intellectual.Gate.vst3" -type d | head -1)
          LV2=$(find build -name "Intellectual.Gate.lv2" -type d | head -1)
          echo "VST3=$VST3 LV2=$LV2"
          tar cf Intellectual.Gate.1-linux-vst3.tar -C "$(dirname "$VST3")" "$(basename "$VST3")"
          tar cf Intellectual.Gate.1-linux-lv2.tar -C "$(dirname "$LV2")" "$(basename "$LV2")"

      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: Intellectual.Gate.1-linux
          path: |
            Intellectual.Gate.1-linux-vst3.tar
            Intellectual.Gate.1-linux-lv2.tar

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DCMAKE_COMPILE_WARNING_AS_ERROR=ON

      - name: Build
        run: cmake --build build --config Release 2>&1 | tee build.log

      - name: Build tests
        run: cmake --build build --config Release --target Tests 2>&1 | tee -a build.log

      - name: Check for warnings
        shell: bash
        run: |
          if grep -iE "warning C[0-9]+" build.log | grep -v "modules\\" | grep -v "gtest\\" | grep -v "BinaryData"; then
            echo "::error::Warnings found in project code"
            exit 1
          fi

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Package plugins
        if: github.event_name == 'push'
        shell: bash
        run: |
          VST3=$(find build -name "Intellectual.Gate.vst3" -type d | head -1)
          LV2=$(find build -name "Intellectual.Gate.lv2" -type d | head -1)
          echo "VST3=$VST3 LV2=$LV2"
          tar cf Intellectual.Gate.1-windows-vst3.tar -C "$(dirname "$VST3")" "$(basename "$VST3")"
          tar cf Intellectual.Gate.1-windows-lv2.tar -C "$(dirname "$LV2")" "$(basename "$LV2")"

      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: Intellectual.Gate.1-windows
          path: |
            Intellectual.Gate.1-windows-vst3.tar
            Intellectual.Gate.1-windows-lv2.tar

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_COMPILE_WARNING_AS_ERROR=ON

      - name: Build
        run: cmake --build build 2>&1 | tee build.log

      - name: Build tests
        run: cmake --build build --target Tests 2>&1 | tee -a build.log

      - name: Check for warnings
        run: |
          if grep -E "source/.*warning:" build.log | grep -v "modules/" | grep -v "gtest/" | grep -v "BinaryData"; then
            echo "::error::Warnings found in project code"
            exit 1
          fi

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package plugins
        if: github.event_name == 'push'
        run: |
          VST3=$(find build -name "Intellectual.Gate.vst3" -type d | head -1)
          AU=$(find build -name "Intellectual.Gate.component" -type d | head -1)
          LV2=$(find build -name "Intellectual.Gate.lv2" -type d | head -1)
          echo "VST3=$VST3 AU=$AU LV2=$LV2"
          tar cf Intellectual.Gate.1-macos-vst3.tar -C "$(dirname "$VST3")" "$(basename "$VST3")"
          tar cf Intellectual.Gate.1-macos-au.tar -C "$(dirname "$AU")" "$(basename "$AU")"
          tar cf Intellectual.Gate.1-macos-lv2.tar -C "$(dirname "$LV2")" "$(basename "$LV2")"

      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: Intellectual.Gate.1-macos
          path: |
            Intellectual.Gate.1-macos-vst3.tar
            Intellectual.Gate.1-macos-au.tar
            Intellectual.Gate.1-macos-lv2.tar

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Intellectual Gate v1.0.0
          files: |
            artifacts/Intellectual.Gate.1-linux/*.tar
            artifacts/Intellectual.Gate.1-windows/*.tar
            artifacts/Intellectual.Gate.1-macos/*.tar
